services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-chronograph}
      POSTGRES_USER: ${DB_USER:-chronograph}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chronograph}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/vol/static
      - media_volume:/vol/media

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    env_file:
      - .env
    depends_on:
      - db
    command: ["sh", "docker/scheduler/run_scheduler.sh"]

volumes:
  postgres_data:
  static_volume:
  media_volume:
