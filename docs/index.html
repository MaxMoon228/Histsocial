<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Истобщество — GitHub Pages</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 820px; margin: 40px auto; padding: 0 16px; line-height: 1.5; }
    h1 { margin-bottom: 8px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin: 16px 0; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Истобщество</h1>
  <p>Исходники Django-проекта опубликованы в этом репозитории.</p>
  <div class="card">
    <strong>Важно:</strong> GitHub Pages не запускает Python/Django backend, поэтому здесь доступна только информационная страница.
  </div>
  <p>Локальный запуск:</p>
  <p><code>python manage.py migrate</code><br><code>python manage.py runserver 127.0.0.1:8000</code></p>
</body>
</html>
