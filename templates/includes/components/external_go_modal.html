<div id="external-go-modal" class="external-go-modal" aria-hidden="true">
  <div class="external-go-backdrop" data-external-close></div>
  <div class="external-go-card" role="dialog" aria-modal="true" aria-labelledby="external-go-title">
    <button type="button" class="external-go-close" data-external-close aria-label="Закрыть">×</button>
    <p class="external-go-label">Внешний ресурс</p>
    <h3 id="external-go-title">Переход на внешний сайт</h3>
    <p class="external-go-text">
      Вы переходите к <span id="external-go-content-label">материалу</span>
      <strong id="external-go-item-title">—</strong> на внешнем сайте.
    </p>
    <div class="external-go-domain">
      <span>↗</span>
      <strong id="external-go-domain">example.com</strong>
    </div>
    <p class="external-go-note">
      Истобщество не несет ответственность за содержание внешних ресурсов.
      Все материалы принадлежат их правообладателям.
    </p>
    <div class="external-go-actions">
      <button type="button" class="btn btn-outline" data-external-close>Отмена</button>
      <button type="button" id="external-go-confirm" class="btn">Открыть источник ↗</button>
    </div>
  </div>
</div>
