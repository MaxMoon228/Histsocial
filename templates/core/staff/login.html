{% extends "base.html" %}
{% block title %}Вход в админ-панель — {{ site_name }}{% endblock %}
{% block content %}
<section class="container section">
  <div class="staff-auth-wrap">
    <article class="staff-auth-card">
      <h1>Вход в админ-панель</h1>
      <p>Используйте staff-аккаунт для управления контентом.</p>
      {% if error %}<p class="staff-error">{{ error }}</p>{% endif %}
      <form method="post" class="staff-auth-form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <label>Логин</label>
        <input type="text" name="username" required>
        <label>Пароль</label>
        <input type="password" name="password" required>
        <button class="btn" type="submit">Войти</button>
      </form>
      <a href="/">← На главную</a>
    </article>
  </div>
</section>
{% endblock %}
